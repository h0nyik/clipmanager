name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-arm64:
    name: Build (Apple Silicon)
    runs-on: macos-15          # GitHub-hosted M-series runner
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build (debug, arm64)
        run: swift build -c debug --arch arm64

      - name: Build (release, universal)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble .app bundle
        run: bash Scripts/build-app.sh release universal

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipManager-universal-${{ github.sha }}
          path: build/ClipManager.app
          retention-days: 14

  build-intel:
    name: Build (Intel Mac)
    runs-on: [self-hosted, macos, intel-mac]  # your local Intel runner
    if: github.event_name == 'push'           # skip for PRs from forks
    steps:
      - uses: actions/checkout@v4

      - name: Build (release, x86_64)
        run: swift build -c release --arch x86_64

      - name: Assemble .app bundle (Intel)
        run: bash Scripts/build-app.sh release x86_64
